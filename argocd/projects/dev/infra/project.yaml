apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: infra-dev
  namespace: argocd
spec:
  description: "Dev infrastructure services"
  sourceRepos:
    - "https://kubernetes.github.io/ingress-nginx"
  destinations:
    - namespace: "ingress-nginx-dev"
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
