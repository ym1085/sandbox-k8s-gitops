apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dev-ingress-nginx
  namespace: argocd
spec:
  project: dev-project

  source:
    repoURL: https://kubernetes.github.io/ingress-nginx
    chart: ingress-nginx
    targetRevision: 4.11.0
    helm:
      values: |
        controller:
          ingressClassResource:
            name: nginx-dev
            enabled: true
            default: false
            controllerValue: "k8s.io/ingress-nginx-dev"
          service:
            type: NodePort
            nodePorts:
              http: 30080
              https: 30443
          admissionWebhooks:
            enabled: false

  destination:
    server: https://kubernetes.default.svc
    namespace: dev-ingress-nginx-ns

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - ServerSideDiff=true
      - PruneLast=true
