apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx-stg
  namespace: argocd
spec:
  project: infra-stg
  source:
    repoURL: https://kubernetes.github.io/ingress-nginx
    chart: ingress-nginx
    targetRevision: 4.11.0
    helm:
      values: |
        controller:
          ingressClassResource:
            name: nginx-stg
            enabled: true
            controllerValue: "k8s.io/ingress-nginx-stg"
          service:
            type: NodePort
            nodePorts:
              http: 31080
              https: 31443
          admissionWebhooks:
            enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx-stg
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - ServerSideDiff=true
      - PruneLast=true
